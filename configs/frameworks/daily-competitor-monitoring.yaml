name: daily-competitor-monitoring
display_name: "Daily Competitor Monitoring"
description: >
  Searches Reddit and the open web each morning for mentions of your named
  competitors. Classifies each mention by relevance and sentiment. Surfaces
  the top hits in the dashboard so you can react with comments, content,
  or sales follow-up.

requires:
  providers:
    - firecrawl
  any_of_keys:
    - ANTHROPIC_API_KEY
  context_fields:
    - icp.competitors

recommended_when:
  has_competitors_in_context: true
  has_provider: firecrawl
  not_has_active_framework: daily-competitor-monitoring

inputs:
  - name: competitors
    description: "Competitors to monitor (comma-separated). Defaults to icp.competitors from your captured context."
    default: "$context.icp.competitors"
  - name: subreddits
    description: "Subreddits to search (comma-separated). Edit before running for tighter targeting."
    default: "$context.icp.subreddits"
  - name: max_per_run
    description: "Maximum mentions to surface per run."
    default: 10

schedule:
  cron: "0 8 * * *"
  timezone: "$context.company.timezone"

steps:
  - skill: scrape-reddit-keyword
    input:
      keywords: "{{competitors}}"
      subreddits: "{{subreddits}}"
      since: "yesterday-08:00"
  - skill: classify-mentions
    input:
      mentions: "{{steps[0].output}}"
      relevance_prompt: "Is this a real evaluation or comparison of our competitor, or just a name-drop?"
  - skill: rank-and-truncate
    input:
      mentions: "{{steps[1].output}}"
      n: "{{max_per_run}}"

output:
  destination_choice:
    - notion:
        when: "$has_provider:notion"
        page_template: "configs/frameworks/templates/notion/daily-competitor-monitoring.md"
        target_db: "$config.notion.parent_page"
    - dashboard:
        when: "$has_provider:dashboard_local"
        route: "/frameworks/daily-competitor-monitoring"
        view_template: "configs/frameworks/templates/html/daily-competitor-monitoring.hbs"

seed_run:
  description: "On install, run once with a 7-day lookback to populate initial state."
  override_inputs:
    since: "7-days-ago"
