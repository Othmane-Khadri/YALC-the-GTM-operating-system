name: daily-funded-companies
display_name: "Daily Funded Companies"
description: >
  Pulls a daily Crustdata feed of companies that announced funding in
  the last 24 hours and match your ICP filters. Each row includes the
  round size, lead investor, and a one-line rationale for outreach.

requires:
  providers:
    - crustdata
  any_of_keys:
    - ANTHROPIC_API_KEY
  context_fields:
    - icp.segments_freeform

recommended_when:
  has_provider: crustdata
  has_icp_segments: true
  not_has_active_framework: daily-funded-companies

inputs:
  - name: segments
    description: "ICP segments to filter the funding feed by."
    default: "$context.icp.segments_freeform"
  - name: min_round_size_usd
    description: "Skip rounds smaller than this (USD)."
    default: 1000000
  - name: max_per_run
    description: "Maximum funded companies to surface per run."
    default: 20

schedule:
  cron: "0 8 * * *"
  timezone: "$context.company.timezone"

steps:
  - skill: detect-funding
    input:
      segments: "{{segments}}"
      min_round_size_usd: "{{min_round_size_usd}}"
      window: "24h"
  - skill: dedupe-against-history
    input:
      candidates: "{{steps[0].output}}"
      lookback_days: 14
  - skill: rank-and-truncate
    input:
      mentions: "{{steps[1].output}}"
      n: "{{max_per_run}}"

output:
  destination_choice:
    - notion:
        when: "$has_provider:notion"
        page_template: "configs/frameworks/templates/notion/daily-funded-companies.md"
        target_db: "$config.notion.parent_page"
    - dashboard:
        when: "$has_provider:dashboard_local"
        route: "/frameworks/daily-funded-companies"
        view_template: "configs/frameworks/templates/html/daily-funded-companies.hbs"

seed_run:
  description: "On install, backfill the past 7 days of funding rounds."
  override_inputs:
    window: "7d"
