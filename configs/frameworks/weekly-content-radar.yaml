name: weekly-content-radar
display_name: "Weekly Content Radar"
description: >
  Each Monday, finds high-engagement posts in target communities that
  match your niche keywords. Suggests how to repurpose each one as a
  reply, comment, or original post in your voice.

requires:
  providers:
    - firecrawl
  any_of_keys:
    - ANTHROPIC_API_KEY
  context_fields:
    - icp.pain_points

recommended_when:
  has_provider: firecrawl
  has_target_communities: true
  not_has_active_framework: weekly-content-radar

inputs:
  - name: communities
    description: "Communities to scan (subreddits, Slack workspaces, LinkedIn groups). Comma-separated."
    default: "$context.icp.target_communities"
  - name: keywords
    description: "Keywords / pain points to weight relevance on."
    default: "$context.icp.pain_points"
  - name: min_upvotes
    description: "Skip posts below this engagement threshold."
    default: 25
  - name: max_per_run
    description: "Maximum posts to surface per run."
    default: 10

schedule:
  cron: "0 8 * * 1"
  timezone: "$context.company.timezone"

steps:
  - skill: scrape-community-feed
    input:
      communities: "{{communities}}"
      keywords: "{{keywords}}"
      min_upvotes: "{{min_upvotes}}"
  - skill: classify-mentions
    input:
      mentions: "{{steps[0].output}}"
      relevance_prompt: "Would the user's audience care about this? Rate relevance 0-100."
  - skill: rank-and-truncate
    input:
      mentions: "{{steps[1].output}}"
      n: "{{max_per_run}}"

output:
  destination_choice:
    - notion:
        when: "$has_provider:notion"
        page_template: "configs/frameworks/templates/notion/weekly-content-radar.md"
        target_db: "$config.notion.parent_page"
    - dashboard:
        when: "$has_provider:dashboard_local"
        route: "/frameworks/weekly-content-radar"
        view_template: "configs/frameworks/templates/html/weekly-content-radar.hbs"

seed_run:
  description: "On install, scan the past 7 days to populate the initial radar."
  override_inputs:
    lookback_days: 7
