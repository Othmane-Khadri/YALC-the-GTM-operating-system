name: competitor-audience-mining
display_name: "Competitor Audience Mining"
description: >
  Each morning, fetches a tracked competitor's most recent LinkedIn posts,
  scrapes the people who engaged with them, enriches the qualified ones,
  scores them against your ICP, and surfaces the top engagers for outreach
  approval. Replaces the previous Reddit-flavored daily-competitor-monitoring
  framework with a LinkedIn-only, signal-rich workflow.

requires:
  providers:
    - unipile
  any_of_keys:
    - ANTHROPIC_API_KEY

recommended_when:
  has_provider: unipile
  not_has_active_framework: competitor-audience-mining

inputs:
  - name: competitor_url
    description: "LinkedIn URL of the competitor to monitor."
    default: "$context.icp.competitors"
  - name: account_id
    description: "Unipile account id used to make the request."
    default: "$context.sources.linkedin_account_id"
  - name: posts_lookback
    description: "Number of recent competitor posts to fetch each run."
    default: 5
  - name: top_n
    description: "Top N engagers (after qualification) to surface for the human gate."
    default: 10

mode: scheduled

schedule:
  cron: "0 9 * * *"
  timezone: "$context.company.timezone"

steps:
  - skill: monitor-competitor-content
    input:
      account_id: "{{account_id}}"
      competitor_url: "{{competitor_url}}"
      limit: "{{posts_lookback}}"
  - skill: scrape-post-engagers
    input:
      account_id: "{{account_id}}"
      posts: "{{steps[0].output}}"
  - skill: enrich-email
    input:
      contacts: "{{steps[1].output}}"
  - skill: qualify-engagers
    input:
      engagers: "{{steps[2].output}}"
      min_score: 60
      icp_yaml_content: "$file:~/.gtm-os/icp/segments.yaml"
  - skill: rank-and-truncate
    input:
      mentions: "{{steps[3].output}}"
      n: "{{top_n}}"
  - gate:
      id: approve-engagers
      prompt: "Approve the top engagers to add to your unified leads."
      surface: ui-today
      payload_from_step: 4

output:
  destination_choice:
    - dashboard:
        when: "$has_provider:dashboard_local"
        route: "/frameworks/competitor-audience-mining"

seed_run:
  description: "On install, run once with a 14-day lookback to seed the audience."
  override_inputs:
    posts_lookback: 14

default_visualization:
  view_id: competitor-mining-leads
  intent: "ICP-scored lead list grouped by competitor source, click-through to LinkedIn profile"
