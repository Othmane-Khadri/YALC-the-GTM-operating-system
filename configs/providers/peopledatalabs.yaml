id: peopledatalabs
display_name: "People Data Labs"
homepage: https://peopledatalabs.com
docs_url: https://docs.peopledatalabs.com
key_acquisition_url: https://dashboard.peopledatalabs.com/main/api-keys
integration_kind: mcp
mcp_template: peopledatalabs
env_vars:
  - name: PDL_API_KEY
    description: "People Data Labs API key. Found in the dashboard under API Keys."
    example: "pdl_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    required: true
capabilities_supported: []
install_steps:
  - "Sign up at $homepage if you don't have an account."
  - "Get your API key from $key_acquisition_url"
  - "Run: yalc-gtm connect-provider $id"
  - "When prompted, paste your key. (Use the form at http://localhost:3847/keys/connect once UI ships in 0.9.0.)"
test_query: null
