id: brevo
display_name: "Brevo (Email)"
homepage: https://brevo.com
docs_url: https://developers.brevo.com
key_acquisition_url: https://app.brevo.com/settings/keys/api
integration_kind: rest
mcp_template: null
env_vars:
  - name: BREVO_API_KEY
    description: "Brevo (formerly Sendinblue) API v3 key."
    example: "xkeysib-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    required: true
capabilities_supported: []
install_steps:
  - "Sign up at $homepage if you don't have an account."
  - "Get your API key from $key_acquisition_url"
  - "No bundled MCP template ships for Brevo yet — the email_send capability will fall back to your own REST wiring (or to Instantly when it ships first)."
  - "Run: yalc-gtm connect-provider $id"
  - "When prompted, paste your key. (Use the form at http://localhost:3847/keys/connect once UI ships in 0.9.0.)"
test_query: null
