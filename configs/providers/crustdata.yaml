id: crustdata
display_name: "Crustdata"
homepage: https://crustdata.com
docs_url: https://docs.crustdata.com
key_acquisition_url: https://crustdata.com/api
integration_kind: rest
mcp_template: null
env_vars:
  - name: CRUSTDATA_API_KEY
    description: "Crustdata API token. Authorizes company + people search/enrich/social calls."
    example: "abcd1234abcd1234abcd1234abcd1234"
    required: true
capabilities_supported:
  - id: icp-company-search
    adapter_module: src/lib/providers/adapters/icp-company-search-crustdata.ts
  - id: people-enrich
    adapter_module: src/lib/providers/adapters/people-enrich-crustdata.ts
  - id: funding-feed
    adapter_module: src/lib/providers/adapters/funding-feed-crustdata.ts
  - id: hiring-signal
    adapter_module: src/lib/providers/adapters/hiring-signal-crustdata.ts
  - id: person-job-change-signal
    adapter_module: src/lib/providers/adapters/person-job-change-signal-crustdata.ts
install_steps:
  - "Sign up at $homepage if you don't have an account."
  - "Get your API key from $key_acquisition_url"
  - "Run: yalc-gtm connect-provider $id"
  - "When prompted, paste your key. (Use the form at http://localhost:3847/keys/connect once UI ships in 0.9.0.)"
test_query:
  capability: icp-company-search
  input:
    industry: "SaaS"
    limit: 1
