id: apollo
display_name: "Apollo.io"
homepage: https://apollo.io
docs_url: https://docs.apollo.io
key_acquisition_url: https://app.apollo.io/#/settings/integrations/api
integration_kind: mcp
mcp_template: apollo
env_vars:
  - name: APOLLO_API_KEY
    description: "Apollo API key. Found under Settings → Integrations → API."
    example: "apollo_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    required: true
capabilities_supported:
  - id: icp-company-search
    adapter_module: src/lib/providers/adapters/icp-company-search-apollo.ts
install_steps:
  - "Sign up at $homepage if you don't have an account."
  - "Get your API key from $key_acquisition_url"
  - "Run: yalc-gtm connect-provider $id"
  - "When prompted, paste your key. (Use the form at http://localhost:3847/keys/connect once UI ships in 0.9.0.)"
test_query:
  capability: icp-company-search
  input:
    industry: "Software"
    limit: 1
