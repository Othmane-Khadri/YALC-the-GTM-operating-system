id: unipile
display_name: "Unipile"
homepage: https://unipile.com
docs_url: https://developer.unipile.com
key_acquisition_url: https://dashboard.unipile.com
integration_kind: rest
mcp_template: null
env_vars:
  - name: UNIPILE_DSN
    description: "Unipile DSN URL. Format: https://api{N}.unipile.com:{PORT}"
    example: "https://api6.unipile.com:13601"
    required: true
  - name: UNIPILE_API_KEY
    description: "Unipile API key. Found in the dashboard under API Keys."
    example: "unp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    required: true
capabilities_supported:
  - id: linkedin-engager-fetch
    adapter_module: src/lib/providers/adapters/linkedin-engager-fetch-unipile.ts
  - id: linkedin-user-posts-fetch
    adapter_module: src/lib/providers/adapters/linkedin-user-posts-fetch-unipile.ts
install_steps:
  - "Sign up at $homepage if you don't have an account."
  - "Get your DSN + API key from $key_acquisition_url"
  - "Run: yalc-gtm connect-provider $id"
  - "When prompted, paste both values. (Use the form at http://localhost:3847/keys/connect once UI ships in 0.9.0.)"
test_query: null
