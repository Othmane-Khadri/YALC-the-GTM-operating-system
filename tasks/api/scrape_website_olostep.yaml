# Task: Scrape Website via Olostep (through Orthogonal)
# Olostep is best for: clean webpage scraping, markdown conversion

id: scrape_website_olostep
name: "Scrape Website (Olostep)"
description: "Scrape a webpage and return clean markdown content."
provider: orthogonal
api_slug: olostep
endpoint: /v1/scrape
method: POST
param_mapping:
  url: url_to_scrape
  format: format              # "markdown" or "html"
output_fields:
  - content: markdown_content
  - title: title
  - url: url
best_for:
  - "Company website analysis"
  - "Blog post extraction"
  - "Prospect research"
cost_per_call: "~$0.005 via Orthogonal"
