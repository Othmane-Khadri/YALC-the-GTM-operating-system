id: search_web_firecrawl
name: Web Search & Scrape
description: Search the web or scrape URLs to markdown via Firecrawl SDK
provider: firecrawl
env_required:
  - FIRECRAWL_API_KEY
capabilities:
  - search
  - enrich
best_for:
  - Searching the web for companies matching criteria
  - Scraping company websites for tech stack, pricing, team info
  - Extracting structured data from web pages
  - Discovering all URLs on a domain
