# Task: Find Emails via Hunter (through Orthogonal)
# Hunter is best for: domain search, email patterns

id: enrich_emails_hunter
name: "Find Emails (Hunter)"
description: "Discover email addresses associated with a domain using Hunter.io."
provider: orthogonal
api_slug: hunter
endpoint: /v2/domain-search
method: GET
param_mapping:
  domain: domain
  count: limit
output_fields:
  - email: value
  - first_name: first_name
  - last_name: last_name
  - position: position
  - department: department
  - confidence: confidence
best_for:
  - "Email pattern detection"
  - "Domain-level email search"
cost_per_call: "~$0.01 via Orthogonal"
