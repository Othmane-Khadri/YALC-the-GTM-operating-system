# Task: Find Emails via Tomba (through Orthogonal)
# Tomba is best for: email discovery by domain, email verification

id: enrich_emails_tomba
name: "Find Emails (Tomba)"
description: "Find email addresses for a company domain. Returns all discovered emails with confidence scores."
provider: orthogonal
api_slug: tomba
endpoint: /v1/domain-search
method: GET
param_mapping:
  domain: domain              # Company domain to search
  count: limit                # Number of emails to return
output_fields:
  - email: email
  - first_name: first_name
  - last_name: last_name
  - position: position
  - department: department
  - confidence: score
best_for:
  - "Email discovery by domain"
  - "Finding decision-maker emails"
  - "Email verification"
cost_per_call: "~$0.01 via Orthogonal"
