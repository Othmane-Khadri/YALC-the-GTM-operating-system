# GTM-OS — Example Company Context
# Copy this to gtm-os.yaml and customize for your company.

onboarding_complete: true

company:
  name: "Acme Corp"
  website: "https://example.com"
  linkedin_url: "https://linkedin.com/company/acme-corp"
  industry: "SaaS"
  sub_industry: "Developer Tools"
  stage: "series-a"
  description: "Acme Corp builds developer productivity tools that help engineering teams ship faster. Our platform integrates with existing CI/CD pipelines and provides AI-powered code review, automated testing, and deployment optimization."
  team_size: "50-100"
  founded_year: 2023
  headquarters: "San Francisco, CA"

positioning:
  value_prop: "Ship 3x faster with AI-powered developer workflows"
  tagline: "The developer productivity platform"
  category: "Developer Tools"
  differentiators:
    - "AI-native architecture — not bolted on"
    - "Works with existing CI/CD — zero migration"
    - "SOC 2 Type II compliant from day one"
  proof_points:
    - "200+ engineering teams"
    - "40% reduction in time-to-deploy"
    - "99.9% uptime SLA"
  competitors:
    - name: "LinearB"
      website: "https://linearb.io"
      positioning: "Engineering management platform"
      weaknesses:
        - "Focused on metrics, not workflow automation"
        - "No AI-powered code review"

segments:
  - id: "primary"
    name: "Series A-B Engineering Leaders"
    description: "VP Engineering / CTO at Series A-B SaaS companies with 20-100 engineers"
    priority: "primary"
    target_roles:
      - "VP Engineering"
      - "CTO"
      - "Head of Platform"
      - "Engineering Manager"
    target_company_sizes:
      - "50-200"
    target_industries:
      - "SaaS"
      - "Developer Tools"
      - "Fintech"
    pain_points:
      - "Slow release cycles"
      - "Too much manual testing"
      - "Developer burnout from toil"
    buying_triggers:
      - "Just raised Series A/B"
      - "Hired first platform engineer"
      - "Competitor shipped faster"
    disqualifiers:
      - "Pre-revenue"
      - "Enterprise (500+ engineers) — have in-house platform teams"
      - "Non-technical founders with no engineering team"
    voice:
      tone: "Technical but approachable"
      style: "Peer-to-peer — engineer talking to engineer"
      key_phrases:
        - "ship faster"
        - "developer experience"
        - "platform engineering"
      avoid_phrases:
        - "disrupting"
        - "revolutionary"
        - "game-changing"
    messaging:
      elevator_pitch: "We help engineering teams ship 3x faster by automating the toil between commit and deploy."
      key_messages:
        - "Your best engineers shouldn't spend 40% of their time on CI/CD plumbing"
        - "AI code review catches bugs before they reach staging"
        - "Zero-config setup — works with your existing GitHub/GitLab workflow"

signals:
  buying_intent:
    - "Hiring for platform engineering roles"
    - "Complaining about slow deploys on social media"
    - "Evaluating CI/CD tools (mentioned in community posts)"
  engagement:
    - "Attended developer productivity webinar"
    - "Downloaded engineering metrics whitepaper"

channels:
  primary:
    - "LinkedIn"
    - "Developer communities (Reddit, HN)"
    - "Email"
  secondary:
    - "Twitter/X"
    - "Dev conferences"

learnings: []
objections: []
connected_providers: []
